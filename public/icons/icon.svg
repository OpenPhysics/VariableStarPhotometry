<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Night sky background -->
  <rect width="512" height="512" fill="#0a0a1a"/>
  <!-- Stars field -->
  <circle cx="80" cy="80" r="4" fill="#ffffff"/>
  <circle cx="200" cy="60" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="350" cy="90" r="2.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="430" cy="50" r="3" fill="#ffffff"/>
  <circle cx="120" cy="180" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="300" cy="150" r="2.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="460" cy="160" r="2" fill="#ffffff" opacity="0.5"/>
  <!-- Variable star (pulsating) — larger, warm yellow -->
  <circle cx="256" cy="220" r="28" fill="#ffe066" opacity="0.15"/>
  <circle cx="256" cy="220" r="18" fill="#ffe066" opacity="0.4"/>
  <circle cx="256" cy="220" r="10" fill="#ffe066"/>
  <!-- Aperture circle around the variable star -->
  <circle cx="256" cy="220" r="42" fill="none" stroke="#4fc3f7" stroke-width="2.5" stroke-dasharray="6 4"/>
  <!-- Light curve sketch at bottom -->
  <polyline
    points="40,400 80,380 120,410 160,360 200,395 240,345 280,390 320,350 360,385 400,355 440,388 480,360"
    fill="none"
    stroke="#4fc3f7"
    stroke-width="3"
    stroke-linejoin="round"
    stroke-linecap="round"
  />
  <!-- Axis lines for light curve -->
  <line x1="35" y1="340" x2="35" y2="420" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="35" y1="420" x2="490" y2="420" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
</svg>
